stages:
  - release

release:
  stage: release
  image: thyrlian/android-sdk:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "dev"
    - if: $CI_PIPELINE_SOURCE == "web"
  variables:
    ANDROID_HOME: "/opt/android-sdk"
  before_script:
    - mkdir -p ~/.gradle
    - echo "gpr.user=${GPR_USER}" >> ~/.gradle/gradle.properties
    - echo "gpr.key=${GPR_KEY}" >> ~/.gradle/gradle.properties
    - yes | sdkmanager --licenses || true
    - sdkmanager "platforms;android-36" "build-tools;36.0.0"
    - apt-get update && apt-get install -y curl jq python3
    - curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
    - apt-get install -y nodejs
    - git config --global user.email "semantic-release-bot@martynus.net"
    - git config --global user.name "semantic-release-bot"
  script:
    - ./gradlew :patches:buildAndroid :patches:generatePatchesList
    - npm install
    - npx semantic-release
  artifacts:
    paths:
      - patches/build/libs/*.mpp
